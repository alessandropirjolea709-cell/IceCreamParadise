<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Products</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    background-color: lightblue;
    font-family: Arial, sans-serif;
    padding: 20px;
  }
  
  nav {
    background-color: rgba(255, 255, 255, 0.9);
    padding: 15px;
    border-radius: 5px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    margin-bottom: 30px;
  }
  
  .navbar ul {
    list-style-type: none;
    display: flex;
    gap: 20px;
  }
  
  .navbar a {
    color: black;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
  }
  
  .navbar a:hover {
    text-decoration: underline;
  }
  
  h1 {
    font-size: 32px;
    margin-bottom: 20px;
    color: #333;
  }
  
  h2 {
    font-size: 24px;
    margin-bottom: 15px;
    color: #333;
    border-bottom: 2px solid #333;
    padding-bottom: 10px;
  }
  
  p {
    line-height: 1.8;
    color: #333;
    margin-bottom: 15px;
  }
  
  .contact-link {
    position: fixed;
    top: 10px;
    left: 10px;
    background-color: white;
    padding: 10px 15px;
    border-radius: 5px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    z-index: 100;
  }
  
  .contact-link a {
    color: black;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
  }
  
  .contact-link a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
<div class="contact-link">
  <a href="contact.html">Contact</a>
</div>
<h1>Our Products / Services</h1>
<p>These are ways you guys can contact us online at any time and we will get back ASAP!!!</p>
</body>
</html>
